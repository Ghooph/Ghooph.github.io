<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Style Messenger | Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }
        body.light {
            --bg-page: linear-gradient(145deg, #eef2f5 0%, #e2e8f0 100%);
            --bg-surface: #ffffff;
            --bg-surface-secondary: #f8fafc;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --message-own: #dbeafe;
            --message-other: #ffffff;
            --hover: #f1f5f9;
            --active: #eef2ff;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            --overlay: rgba(0,0,0,0.5);
            --bg-message-area: radial-gradient(circle at 10% 20%, rgba(37,99,235,0.02) 0%, rgba(37,99,235,0.01) 100%);
        }
        body.dark {
            --bg-page: linear-gradient(145deg, #0f172a 0%, #0a0f1c 100%);
            --bg-surface: #1e293b;
            --bg-surface-secondary: #0f172a;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --message-own: #1e3a8a;
            --message-other: #2d3a4f;
            --hover: #334155;
            --active: #1e3a8a;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            --overlay: rgba(0,0,0,0.7);
            --bg-message-area: radial-gradient(circle at 10% 20%, rgba(59,130,246,0.03) 0%, rgba(59,130,246,0.01) 100%);
        }
        body {
            background: var(--bg-page);
            color: var(--text-primary);
        }
        body.font-small .bubble-content { font-size: 0.85rem; }
        body.font-medium .bubble-content { font-size: 1rem; }
        body.font-large .bubble-content { font-size: 1.1rem; }

        /* Ключевые стили для корректной высоты и прокрутки */
        .messenger-container, .messenger-layout {
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }
        .messenger-layout {
            display: flex;
            background: var(--bg-surface);
        }
        .sidebar {
            width: 320px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
            z-index: 20;
            height: 100%;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-surface-secondary);
            height: 100%;
            overflow: hidden;
        }
        .chat-header {
            flex-shrink: 0;
            padding: 16px 20px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-message-area);
            position: relative;
        }
        .message-input-area {
            flex-shrink: 0;
            background: var(--bg-surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--border);
        }
        /* Остальные стили без изменений */
        .auth-card {
            max-width: 460px;
            width: 90%;
            background: var(--bg-surface);
            border-radius: 32px;
            padding: 32px 28px;
            margin: 0 auto;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .auth-tab {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 8px 0;
            cursor: pointer;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: inherit;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        .btn-danger {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .user-info-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }
        .user-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .icon-btn:hover {
            background: var(--hover);
            color: var(--accent);
        }
        .search-box {
            padding: 12px 16px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg-surface-secondary);
            color: var(--text-primary);
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 16px;
            margin: 4px 8px;
        }
        .contact-item:hover {
            background: var(--hover);
        }
        .contact-item.active {
            background: var(--active);
        }
        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .contact-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .contact-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .chat-contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }
        .chat-contact-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        .chat-contact-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        .messages-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(45deg, var(--accent) 0px, var(--accent) 1px, transparent 1px, transparent 20px);
            opacity: 0.03;
            pointer-events: none;
        }
        .message-bubble {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s;
            position: relative;
            z-index: 1;
        }
        .own-message {
            align-self: flex-end;
            align-items: flex-end;
        }
        .other-message {
            align-self: flex-start;
        }
        .bubble-content {
            background: var(--message-other);
            padding: 10px 14px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            word-break: break-word;
            color: var(--text-primary);
            position: relative;
        }
        .own-message .bubble-content {
            background: var(--message-own);
            border-bottom-right-radius: 6px;
        }
        .other-message .bubble-content {
            border-bottom-left-radius: 6px;
        }
        .message-sender {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .message-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
            display: inline-block;
        }
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .delete-msg-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 12px;
        }
        .delete-msg-btn:hover {
            background: var(--hover);
            color: #ef4444;
        }
        .file-attachment {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-surface-secondary);
            padding: 8px 12px;
            border-radius: 20px;
            margin-top: 6px;
        }
        .file-preview-img {
            max-width: 180px;
            border-radius: 16px;
            cursor: pointer;
        }
        .attach-btn, .send-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--accent);
        }
        .message-input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 12px 18px;
            background: var(--bg-surface-secondary);
            color: var(--text-primary);
        }
        .hamburger {
            display: none;
            font-size: 1.5rem;
            background: none;
            border: none;
            margin-right: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 15;
            backdrop-filter: blur(3px);
        }
        @media (max-width: 680px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .hamburger {
                display: block;
            }
            .sidebar-overlay.active {
                display: block;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
            animation: fadeUp 0.2s;
        }
        @keyframes fadeUp {
            from { opacity: 0; bottom: 0; }
            to { opacity: 1; bottom: 20px; }
        }
        .modal {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
        }
        .modal-card {
            background: var(--bg-surface);
            width: 90%;
            max-width: 420px;
            border-radius: 32px;
            padding: 28px;
            color: var(--text-primary);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }
        select, input[type="checkbox"] {
            background: var(--bg-surface-secondary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 20px;
            color: var(--text-primary);
        }
        .empty-chat {
            text-align: center;
            color: var(--text-muted);
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ---------- FIREBASE CONFIG ----------
    const firebaseConfig = {
        apiKey: "AIzaSyAAMd-15AGf5axz8I5qR6vHd9fgC50-Gu0",
        authDomain: "ghoophgram.firebaseapp.com",
        projectId: "ghoophgram",
        storageBucket: "ghoophgram.firebasestorage.app",
        messagingSenderId: "483438804267",
        appId: "1:483438804267:web:fa83ab98115fbbd2d8596e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global state
    let currentUser = null;
    let currentContact = null;
    let currentMessages = [];
    let currentMessagesRef = null;
    let currentMessagesCallback = null;
    
    // Settings
    let userSettings = {
        notifications: true,
        fontSize: 'medium',
        language: 'ru',
        timeFormat: '24h'
    };

    // Translations
    const translations = {
        ru: {
            search: "Поиск контактов...",
            messagePlaceholder: "Сообщение...",
            emptyChat: "Выберите контакт для начала диалога",
            noMessages: "Нет сообщений",
            noContacts: "Нет контактов",
            profileTitle: "Мой профиль",
            settingsTitle: "Настройки",
            notifications: "Уведомления",
            fontSize: "Размер шрифта",
            small: "Маленький",
            medium: "Средний",
            large: "Большой",
            language: "Язык интерфейса",
            timeFormatLabel: "Формат времени",
            time24h: "24 часа",
            time12h: "12 часов",
            deleteAllMyMessages: "Удалить все мои сообщения",
            changePassword: "Сменить пароль",
            save: "Сохранить",
            cancel: "Отмена",
            oldPassword: "Старый пароль",
            newPassword: "Новый пароль",
            passwordChanged: "Пароль изменён",
            wrongPassword: "Неверный старый пароль",
            login: "Логин",
            bio: "О себе",
            avatar: "Аватар (изображение)",
            status: "Статус",
            displayName: "Отображаемое имя",
            deleteAccount: "Удалить аккаунт",
            logout: "Выйти",
            theme: "Тема"
        },
        en: {
            search: "Search contacts...",
            messagePlaceholder: "Message...",
            emptyChat: "Select a contact to start chatting",
            noMessages: "No messages",
            noContacts: "No contacts",
            profileTitle: "My profile",
            settingsTitle: "Settings",
            notifications: "Notifications",
            fontSize: "Font size",
            small: "Small",
            medium: "Medium",
            large: "Large",
            language: "Language",
            timeFormatLabel: "Time format",
            time24h: "24-hour",
            time12h: "12-hour",
            deleteAllMyMessages: "Delete all my messages",
            changePassword: "Change password",
            save: "Save",
            cancel: "Cancel",
            oldPassword: "Old password",
            newPassword: "New password",
            passwordChanged: "Password changed",
            wrongPassword: "Wrong old password",
            login: "Login",
            bio: "About",
            avatar: "Avatar (image)",
            status: "Status",
            displayName: "Display name",
            deleteAccount: "Delete account",
            logout: "Logout",
            theme: "Theme"
        }
    };
    let t = translations.ru;
    function updateLanguage() {
        t = translations[userSettings.language] || translations.ru;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key]) el.innerText = t[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            if (t[key]) el.placeholder = t[key];
        });
    }

    function loadSettings() {
        const saved = localStorage.getItem('messenger_settings');
        if (saved) {
            try {
                userSettings = { ...userSettings, ...JSON.parse(saved) };
            } catch(e) {}
        }
        applySettings();
    }
    function saveSettings() {
        localStorage.setItem('messenger_settings', JSON.stringify(userSettings));
        applySettings();
    }
    function applySettings() {
        document.body.classList.remove('font-small', 'font-medium', 'font-large');
        document.body.classList.add(`font-${userSettings.fontSize}`);
        updateLanguage();
    }

    // Theme handling
    const themeKey = 'messenger_theme';
    function initTheme() {
        const saved = localStorage.getItem(themeKey);
        if (saved === 'dark') document.body.classList.add('dark');
        else document.body.classList.add('light');
    }
    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
        localStorage.setItem(themeKey, document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    initTheme();
    loadSettings();

    // Helper functions
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getChatId(a,b) { return [a,b].sort().join('_'); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function formatTime(timestamp) {
        if (!timestamp) return "—";
        const date = new Date(timestamp);
        if (isNaN(date.getTime())) return "—";
        return userSettings.timeFormat === '24h' 
            ? date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            : date.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', hour12: true});
    }
    function showToast(msg) {
        if (!userSettings.notifications) return;
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // Firebase operations
    async function loadAllUsers() {
        try {
            const snap = await db.ref('users').once('value');
            return snap.val() ? Object.values(snap.val()) : [];
        } catch(e) {
            console.error("Ошибка загрузки пользователей:", e);
            showToast("Ошибка подключения к базе данных");
            return [];
        }
    }
    async function registerUser(login, pass, name, avatar, bio) {
        const users = await loadAllUsers();
        if (users.find(u => u.login === login)) return { success: false, error: "Логин уже существует" };
        const newUser = {
            id: generateId(), login, password: pass, displayName: name || login,
            avatar: avatar || `https://ui-avatars.com/api/?background=2563eb&color=fff&name=${encodeURIComponent(name || login)}`,
            status: "Доступен", bio: bio || "", createdAt: new Date().toISOString()
        };
        await db.ref('users/' + newUser.id).set(newUser);
        return { success: true, user: newUser };
    }
    async function loginUser(login, pass) {
        login = login.trim();
        pass = pass.trim();
        const users = await loadAllUsers();
        const user = users.find(u => u.login === login && u.password === pass);
        if (user) return { success: true, user };
        return { success: false, error: "Неверный логин или пароль" };
    }
    async function updateUserProfile(id, updates) {
        await db.ref('users/' + id).update(updates);
        if (currentUser && currentUser.id === id) {
            currentUser = { ...currentUser, ...updates };
            localStorage.setItem('messenger_user', JSON.stringify(currentUser));
        }
    }
    async function changePassword(oldPass, newPass) {
        if (currentUser.password !== oldPass) return { success: false, error: t.wrongPassword };
        await updateUserProfile(currentUser.id, { password: newPass });
        return { success: true };
    }
    async function deleteUserAccount(id) {
        if (!confirm(t.deleteAccount + "?")) return false;
        const chats = await db.ref('messages').once('value');
        if (chats.val()) {
            for (let chatId in chats.val()) if (chatId.includes(id)) await db.ref('messages/' + chatId).remove();
        }
        await db.ref('users/' + id).remove();
        return true;
    }
    async function deleteMessage(chatId, msgId) {
        await db.ref(`messages/${chatId}/${msgId}`).remove();
    }
    async function deleteAllUserMessages(userId) {
        if (!confirm(t.deleteAllMyMessages + "?")) return;
        const chats = await db.ref('messages').once('value');
        if (chats.val()) {
            for (let chatId in chats.val()) {
                const msgs = chats.val()[chatId];
                for (let msgId in msgs) {
                    if (msgs[msgId].fromUserId === userId) await db.ref(`messages/${chatId}/${msgId}`).remove();
                }
            }
        }
        showToast(t.deleteAllMyMessages);
        if (currentContact) loadChatHistory(currentContact);
    }
    async function clearChatMessages(user1, user2) {
        await db.ref('messages/' + getChatId(user1, user2)).remove();
        showToast("История чата очищена");
    }
    async function sendMessage(text, file) {
        if (!currentUser || !currentContact) return;
        const chatId = getChatId(currentUser.id, currentContact.id);
        const message = {
            id: generateId(), fromUserId: currentUser.id, toUserId: currentContact.id,
            text: text || null, file: file || null, timestamp: new Date().toISOString()
        };
        await db.ref('messages/' + chatId).push(message);
    }

    // Chat listeners
    function detachMessagesListener() {
        if (currentMessagesRef && currentMessagesCallback) {
            currentMessagesRef.off('child_added', currentMessagesCallback);
            currentMessagesRef.off('child_removed', currentMessagesCallback);
            currentMessagesRef.off('child_changed', currentMessagesCallback);
            currentMessagesRef = null;
        }
    }
    function loadChatHistory(contact) {
        detachMessagesListener();
        if (!currentUser || !contact) return;
        const chatId = getChatId(currentUser.id, contact.id);
        const ref = db.ref('messages/' + chatId);
        ref.once('value', snap => {
            currentMessages = snap.val() ? Object.values(snap.val()) : [];
            currentMessages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            renderMessagesArea(chatId);
        });
        const callback = (snap) => {
            const msg = snap.val();
            if (snap.name === 'child_added' && !currentMessages.find(m => m.id === msg.id)) {
                currentMessages.push(msg);
                currentMessages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                renderMessagesArea(chatId);
                if (userSettings.notifications && msg.fromUserId !== currentUser.id) {
                    showToast(`${contact.displayName}: ${msg.text || 'файл'}`);
                }
            } else if (snap.name === 'child_removed') {
                currentMessages = currentMessages.filter(m => m.id !== msg.id);
                renderMessagesArea(chatId);
            } else if (snap.name === 'child_changed') {
                const idx = currentMessages.findIndex(m => m.id === msg.id);
                if (idx !== -1) { currentMessages[idx] = msg; renderMessagesArea(chatId); }
            }
        };
        ref.on('child_added', callback);
        ref.on('child_removed', callback);
        ref.on('child_changed', callback);
        currentMessagesRef = ref;
        currentMessagesCallback = callback;
    }

    function renderMessagesArea(chatId) {
        const container = document.querySelector('.messages-container');
        if (!container) return;
        container.innerHTML = '';
        if (!currentMessages.length) {
            container.innerHTML = `<div class="empty-chat"><i class="fas fa-comment-dots" style="font-size:2rem; opacity:0.5;"></i><p>${t.noMessages}</p></div>`;
            return;
        }
        for (let msg of currentMessages) {
            const isOwn = msg.fromUserId === currentUser.id;
            const sender = isOwn ? currentUser : currentContact;
            const timeStr = formatTime(msg.timestamp);
            const div = document.createElement('div');
            div.className = `message-bubble ${isOwn ? 'own-message' : 'other-message'}`;
            let html = `<div class="bubble-content">`;
            if (!isOwn && sender) html += `<div class="message-sender">${escapeHtml(sender.displayName)}</div>`;
            if (msg.text) html += `<div>${escapeHtml(msg.text)}</div>`;
            if (msg.file && msg.file.data) {
                if (msg.file.type?.startsWith('image/')) {
                    html += `<img src="${msg.file.data}" class="file-preview-img" onclick="window.open('${msg.file.data}','_blank')">`;
                } else {
                    html += `<div class="file-attachment"><i class="fas fa-paperclip"></i> ${escapeHtml(msg.file.name)} <button class="download-btn" data-file='${JSON.stringify(msg.file).replace(/'/g,"&#39;")}'>Скачать</button></div>`;
                }
            } else if (msg.file && !msg.file.data) {
                html += `<div class="file-attachment"><i class="fas fa-exclamation-triangle"></i> Файл повреждён</div>`;
            }
            html += `<div class="message-time">${timeStr}</div>`;
            if (isOwn) {
                html += `<div class="message-actions"><button class="delete-msg-btn" data-msg-id="${msg.id}" data-chat-id="${chatId}"><i class="fas fa-trash-alt"></i></button></div>`;
            }
            html += `</div>`;
            div.innerHTML = html;
            container.appendChild(div);
        }
        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const f = JSON.parse(btn.dataset.file);
                if (f && f.data) {
                    const a = document.createElement('a');
                    a.href = f.data;
                    a.download = f.name;
                    a.click();
                }
            });
        });
        document.querySelectorAll('.delete-msg-btn').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                const msgId = btn.dataset.msgId;
                const chatId = btn.dataset.chatId;
                if (confirm("Удалить сообщение?")) {
                    await deleteMessage(chatId, msgId);
                }
            });
        });
    }

    // Contacts list
    async function renderContactsList(filter = '') {
        const container = document.querySelector('.contacts-list');
        if (!container || !currentUser) return;
        let users = await loadAllUsers();
        users = users.filter(u => u.id !== currentUser.id);
        if (filter) users = users.filter(u => u.displayName.toLowerCase().includes(filter.toLowerCase()) || u.login.toLowerCase().includes(filter.toLowerCase()));
        container.innerHTML = '';
        if (!users.length) {
            container.innerHTML = `<div style="padding:20px; text-align:center;">${t.noContacts}</div>`;
            return;
        }
        users.forEach(contact => {
            const div = document.createElement('div');
            div.className = `contact-item ${currentContact?.id === contact.id ? 'active' : ''}`;
            div.innerHTML = `
                <img class="contact-avatar" src="${contact.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=2563eb&color=fff&name=${encodeURIComponent(contact.displayName)}'">
                <div><div class="contact-name">${escapeHtml(contact.displayName)}</div><div class="contact-status">${escapeHtml(contact.status || 'Онлайн')}</div></div>
            `;
            div.addEventListener('click', () => {
                if (currentContact?.id === contact.id) return;
                currentContact = contact;
                loadChatHistory(contact);
                renderContactsList(document.querySelector('#searchContactsInput')?.value || '');
                updateChatHeader();
                if (window.innerWidth <= 680) closeSidebar();
            });
            container.appendChild(div);
        });
    }
    function updateChatHeader() {
        const header = document.querySelector('.chat-header');
        if (header && currentContact) {
            header.querySelector('.chat-contact-name').innerText = currentContact.displayName;
            header.querySelector('.chat-contact-avatar').src = currentContact.avatar;
        }
    }

    // Modals
    function showContactProfile(contact) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="${contact.avatar}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--accent);">
                    <h3 style="margin-top:12px;">${escapeHtml(contact.displayName)}</h3>
                    <div style="color:var(--text-secondary); font-size:0.9rem;">${escapeHtml(contact.status || 'Онлайн')}</div>
                    <div style="color:var(--text-muted); font-size:0.8rem; margin-top:4px;">${escapeHtml(contact.login)}</div>
                    ${contact.bio ? `<p style="margin-top:16px; padding:12px; background:var(--bg-surface-secondary); border-radius:20px;">${escapeHtml(contact.bio)}</p>` : '<p style="margin-top:16px; color:var(--text-muted);">Нет описания</p>'}
                </div>
                <button class="btn-secondary" id="closeProfile" style="width:100%">${t.cancel}</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#closeProfile').addEventListener('click', () => modal.remove());
    }
    function showOwnProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>${t.profileTitle}</h3>
                <div class="input-group"><label>${t.displayName}</label><input id="editName" value="${escapeHtml(currentUser.displayName)}"></div>
                <div class="input-group"><label>${t.status}</label><input id="editStatus" value="${escapeHtml(currentUser.status || '')}"></div>
                <div class="input-group"><label>${t.bio}</label><textarea id="editBio">${escapeHtml(currentUser.bio || '')}</textarea></div>
                <div class="input-group"><label>${t.avatar}</label><input type="file" id="avatarFile" accept="image/*"></div>
                <div class="flex-buttons">
                    <button class="btn-primary" id="saveProfile">${t.save}</button>
                    <button class="btn-danger" id="delAccount">${t.deleteAccount}</button>
                </div>
                <button class="btn-secondary" id="closeProfile" style="width:100%; margin-top:12px;">${t.cancel}</button>
            </div>
        `;
        document.body.appendChild(modal);
        let avatarData = null;
        modal.querySelector('#avatarFile').addEventListener('change', e => {
            if (e.target.files[0]) {
                const r = new FileReader();
                r.onload = ev => avatarData = ev.target.result;
                r.readAsDataURL(e.target.files[0]);
            }
        });
        modal.querySelector('#saveProfile').addEventListener('click', async () => {
            const updates = {};
            const name = modal.querySelector('#editName').value.trim();
            if (name) updates.displayName = name;
            const status = modal.querySelector('#editStatus').value.trim();
            if (status) updates.status = status;
            const bio = modal.querySelector('#editBio').value.trim();
            updates.bio = bio;
            if (avatarData) updates.avatar = avatarData;
            await updateUserProfile(currentUser.id, updates);
            modal.remove();
            renderMessenger();
        });
        modal.querySelector('#delAccount').addEventListener('click', async () => {
            if (confirm(t.deleteAccount + "?")) {
                await deleteUserAccount(currentUser.id);
                localStorage.removeItem('messenger_user');
                detachMessagesListener();
                currentUser = null; currentContact = null;
                modal.remove();
                renderAuthScreen();
            }
        });
        modal.querySelector('#closeProfile').addEventListener('click', () => modal.remove());
    }
    function showSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h3>${t.settingsTitle}</h3>
                <div class="setting-item"><span>${t.notifications}</span><input type="checkbox" id="notifToggle" ${userSettings.notifications ? 'checked' : ''}></div>
                <div class="setting-item"><span>${t.fontSize}</span>
                    <select id="fontSelect">
                        <option value="small" ${userSettings.fontSize === 'small' ? 'selected' : ''}>${t.small}</option>
                        <option value="medium" ${userSettings.fontSize === 'medium' ? 'selected' : ''}>${t.medium}</option>
                        <option value="large" ${userSettings.fontSize === 'large' ? 'selected' : ''}>${t.large}</option>
                    </select>
                </div>
                <div class="setting-item"><span>${t.language}</span>
                    <select id="langSelect">
                        <option value="ru" ${userSettings.language === 'ru' ? 'selected' : ''}>Русский</option>
                        <option value="en" ${userSettings.language === 'en' ? 'selected' : ''}>English</option>
                    </select>
                </div>
                <div class="setting-item"><span>${t.timeFormatLabel}</span>
                    <select id="timeFormatSelect">
                        <option value="24h" ${userSettings.timeFormat === '24h' ? 'selected' : ''}>${t.time24h}</option>
                        <option value="12h" ${userSettings.timeFormat === '12h' ? 'selected' : ''}>${t.time12h}</option>
                    </select>
                </div>
                <div class="setting-item"><button class="btn-danger" id="deleteAllMessagesBtn" style="width:100%">${t.deleteAllMyMessages}</button></div>
                <div class="setting-item"><button class="btn-primary" id="changePasswordBtn" style="width:100%">${t.changePassword}</button></div>
                <div class="flex-buttons">
                    <button class="btn-primary" id="saveSettings">${t.save}</button>
                    <button class="btn-secondary" id="closeSettings">${t.cancel}</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#saveSettings').addEventListener('click', () => {
            userSettings.notifications = modal.querySelector('#notifToggle').checked;
            userSettings.fontSize = modal.querySelector('#fontSelect').value;
            userSettings.language = modal.querySelector('#langSelect').value;
            userSettings.timeFormat = modal.querySelector('#timeFormatSelect').value;
            saveSettings();
            modal.remove();
            showToast(t.save);
            if (currentContact) loadChatHistory(currentContact);
        });
        modal.querySelector('#deleteAllMessagesBtn').addEventListener('click', async () => {
            await deleteAllUserMessages(currentUser.id);
            modal.remove();
        });
        modal.querySelector('#changePasswordBtn').addEventListener('click', () => {
            const passModal = document.createElement('div');
            passModal.className = 'modal';
            passModal.innerHTML = `
                <div class="modal-card">
                    <h3>${t.changePassword}</h3>
                    <div class="input-group"><label>${t.oldPassword}</label><input type="password" id="oldPass"></div>
                    <div class="input-group"><label>${t.newPassword}</label><input type="password" id="newPass"></div>
                    <div class="flex-buttons">
                        <button class="btn-primary" id="doChangePass">${t.save}</button>
                        <button class="btn-secondary" id="cancelPass">${t.cancel}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(passModal);
            passModal.querySelector('#doChangePass').addEventListener('click', async () => {
                const oldP = passModal.querySelector('#oldPass').value;
                const newP = passModal.querySelector('#newPass').value;
                if (!oldP || !newP) { showToast("Заполните оба поля"); return; }
                const res = await changePassword(oldP, newP);
                if (res.success) {
                    showToast(t.passwordChanged);
                    passModal.remove();
                } else {
                    showToast(res.error);
                }
            });
            passModal.querySelector('#cancelPass').addEventListener('click', () => passModal.remove());
        });
        modal.querySelector('#closeSettings').addEventListener('click', () => modal.remove());
    }

    // Sidebar
    function closeSidebar() { document.getElementById('sidebar')?.classList.remove('open'); document.querySelector('.sidebar-overlay')?.classList.remove('active'); }
    function openSidebar() { document.getElementById('sidebar')?.classList.add('open'); document.querySelector('.sidebar-overlay')?.classList.add('active'); }

    // Main render
    async function renderMessenger() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="messenger-container">
                <div class="sidebar-overlay" id="sidebarOverlay"></div>
                <div class="messenger-layout">
                    <div class="sidebar" id="sidebar">
                        <div class="sidebar-header">
                            <div class="user-info-preview" id="profileBtn">
                                <img class="user-avatar-small" src="${currentUser.avatar}" onerror="this.src='https://ui-avatars.com/api/?background=2563eb&color=fff&name=${encodeURIComponent(currentUser.displayName)}'">
                                <div>${escapeHtml(currentUser.displayName)}</div>
                            </div>
                            <div><button class="icon-btn" id="settingsBtn"><i class="fas fa-cog"></i></button><button class="icon-btn" id="themeBtn"><i class="fas ${document.body.classList.contains('dark') ? 'fa-sun' : 'fa-moon'}"></i></button><button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button></div>
                        </div>
                        <div class="search-box"><input id="searchContactsInput" data-i18n-placeholder="search" placeholder="${t.search}"></div>
                        <div class="contacts-list"></div>
                    </div>
                    <div class="chat-area">
                        <div class="chat-header">
                            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
                            <div class="chat-contact-info" id="contactInfoBtn">
                                <img class="chat-contact-avatar" src="${currentContact?.avatar || 'https://ui-avatars.com/api/?background=ccc&color=fff&name=?'}">
                                <div><div class="chat-contact-name">${currentContact ? escapeHtml(currentContact.displayName) : 'Выберите чат'}</div></div>
                            </div>
                            ${currentContact ? '<button class="icon-btn" id="clearChatBtn" title="Очистить историю"><i class="fas fa-trash-alt"></i></button>' : ''}
                        </div>
                        <div class="messages-container"></div>
                        <div class="message-input-area">
                            <button class="attach-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                            <input class="message-input" id="msgInput" data-i18n-placeholder="messagePlaceholder" placeholder="${t.messagePlaceholder}">
                            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                        </div>
                        <input type="file" id="fileInput" style="display:none">
                    </div>
                </div>
            </div>
        `;
        await renderContactsList();
        if (currentContact) {
            loadChatHistory(currentContact);
            updateChatHeader();
        } else {
            document.querySelector('.messages-container').innerHTML = `<div class="empty-chat"><i class="fas fa-comments" style="font-size:2rem; opacity:0.5;"></i><p>${t.emptyChat}</p></div>`;
        }
        document.getElementById('profileBtn')?.addEventListener('click', showOwnProfileModal);
        document.getElementById('settingsBtn')?.addEventListener('click', showSettingsModal);
        document.getElementById('themeBtn')?.addEventListener('click', () => { toggleTheme(); const i=document.querySelector('#themeBtn i'); if(document.body.classList.contains('dark')) i.classList.remove('fa-moon'),i.classList.add('fa-sun'); else i.classList.remove('fa-sun'),i.classList.add('fa-moon'); });
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('messenger_user'); detachMessagesListener(); currentUser=null; currentContact=null; renderAuthScreen(); });
        document.getElementById('hamburgerBtn')?.addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);
        document.getElementById('attachBtn')?.addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput')?.addEventListener('change', e => { if(e.target.files.length && currentContact) handleFile(e.target.files[0]); e.target.value=''; });
        document.getElementById('sendBtn')?.addEventListener('click', () => { const inp=document.getElementById('msgInput'); const txt=inp.value.trim(); if(txt && currentContact){ sendMessage(txt,null); inp.value=''; } });
        document.getElementById('msgInput')?.addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('sendBtn').click(); });
        document.getElementById('searchContactsInput')?.addEventListener('input', e => renderContactsList(e.target.value));
        document.getElementById('clearChatBtn')?.addEventListener('click', async () => { if(currentContact && confirm("Очистить историю?")){ await clearChatMessages(currentUser.id, currentContact.id); loadChatHistory(currentContact); } });
        document.getElementById('contactInfoBtn')?.addEventListener('click', () => { if(currentContact) showContactProfile(currentContact); });
        updateLanguage();
    }
    function handleFile(file) {
        if(file.size>10*1024*1024) showToast("Файл >10 МБ");
        else { const r=new FileReader(); r.onload=ev=>sendMessage(null,{name:file.name,type:file.type,data:ev.target.result}); r.readAsDataURL(file); }
    }
    function renderAuthScreen() {
        const app = document.getElementById('app');
        app.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100vh;"><div class="auth-card"><div class="auth-tabs"><div class="auth-tab active" data-tab="login">Вход</div><div class="auth-tab" data-tab="register">Регистрация</div></div><div id="authForm"></div><div class="error-msg" id="authError"></div></div></div>`;
        function showLogin() {
            document.getElementById('authForm').innerHTML = `<div class="input-group"><label>Логин</label><input id="loginLogin"></div><div class="input-group"><label>Пароль</label><input id="loginPass" type="password"></div><button class="btn-primary" id="doLogin">Войти</button>`;
            document.getElementById('doLogin').addEventListener('click', async () => {
                const login = document.getElementById('loginLogin').value;
                const pass = document.getElementById('loginPass').value;
                const res = await loginUser(login, pass);
                if(res.success){
                    currentUser = res.user;
                    localStorage.setItem('messenger_user', JSON.stringify(currentUser));
                    renderMessenger();
                } else {
                    document.getElementById('authError').innerText = res.error;
                }
            });
        }
        function showRegister() {
            document.getElementById('authForm').innerHTML = `<div class="input-group"><label>Логин</label><input id="regLogin"></div><div class="input-group"><label>Пароль</label><input id="regPass" type="password"></div><div class="input-group"><label>Имя</label><input id="regName"></div><div class="input-group"><label>О себе</label><textarea id="regBio"></textarea></div><div class="input-group"><label>Аватар</label><input type="file" id="regAvatar" accept="image/*"></div><button class="btn-primary" id="doReg">Зарегистрироваться</button>`;
            document.getElementById('doReg').addEventListener('click', async () => {
                const login=document.getElementById('regLogin').value.trim(), pass=document.getElementById('regPass').value, name=document.getElementById('regName').value.trim(), bio=document.getElementById('regBio').value.trim(), avatarFile=document.getElementById('regAvatar').files[0];
                if(!login||!pass){ document.getElementById('authError').innerText='Заполните логин и пароль'; return; }
                if(avatarFile){
                    const r=new FileReader();
                    r.onload=async e=>{ const res=await registerUser(login,pass,name||login,e.target.result,bio); if(res.success){ currentUser=res.user; localStorage.setItem('messenger_user',JSON.stringify(currentUser)); renderMessenger(); } else document.getElementById('authError').innerText=res.error; };
                    r.readAsDataURL(avatarFile);
                } else {
                    const res=await registerUser(login,pass,name||login,null,bio);
                    if(res.success){ currentUser=res.user; localStorage.setItem('messenger_user',JSON.stringify(currentUser)); renderMessenger(); }
                    else document.getElementById('authError').innerText=res.error;
                }
            });
        }
        showLogin();
        document.querySelectorAll('.auth-tab').forEach(tab=>tab.addEventListener('click',()=>{ document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); tab.dataset.tab==='login'?showLogin():showRegister(); document.getElementById('authError').innerText=''; }));
    }
    (async function init(){
        const saved=localStorage.getItem('messenger_user');
        if(saved){
            try{
                currentUser=JSON.parse(saved);
                const users=await loadAllUsers();
                const exists=users.find(u=>u.id===currentUser.id);
                if(exists){ currentUser=exists; renderMessenger(); }
                else{ localStorage.removeItem('messenger_user'); renderAuthScreen(); }
            }catch(e){ console.error(e); renderAuthScreen(); }
        } else renderAuthScreen();
    })();
</script>
</body>
